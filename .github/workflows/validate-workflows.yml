name: Validate n8n Workflows

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Workflow JSON Files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON syntax
        run: |
          echo "Validating all n8n workflow JSON files..."
          json_files=$(find . -name "*.json" -not -path "./.git/*")
          if [ -z "$json_files" ]; then
            echo "No JSON files found yet - repo is being set up"
            exit 0
          fi
          echo "$json_files" | while read file; do
            echo "Checking: $file"
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "ERROR: Invalid JSON in $file"
              exit 1
            fi
          done
          echo "All JSON files are valid!"

      - name: Count workflows
        run: |
          total=$(find . -name "*.json" -not -path "./.git/*" | wc -l)
          echo "Total workflow files: $total"
          echo "Repository contains $total n8n automation workflows"
